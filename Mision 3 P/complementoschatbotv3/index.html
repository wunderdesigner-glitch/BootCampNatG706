<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot Inteligente</title>
 <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/png">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- CONTENIDO HOME -->
  <main class="home">
    <h1>Página principal</h1>
    <p>Contenido del sitio</p>
  </main>

  <!-- BOTÓN FLOTANTE -->
  <button id="chat-toggle" class="chat-toggle">💬</button>

  <!-- CHAT FLOTANTE -->
  <div id="chat-wrapper" class="chat-wrapper">

    <div class="chat-header">
      <span>🤖 Chatbot</span>
      <button id="chat-close">✖</button>
    </div>

    <!-- TU CHAT ORIGINAL -->
    <div id="chatbox">
      <div id="messages"></div>
      <form id="chatForm">
        <input
          type="text"
          id="userInput"
          placeholder="Escribe tu mensaje..."
          autocomplete="off"
        />
      </form>
    </div>

  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>

  <!-- JS SOLO PARA ABRIR / CERRAR -->
  <script>
    const chatToggle = document.getElementById("chat-toggle");
    const chatWrapper = document.getElementById("chat-wrapper");
    const chatClose = document.getElementById("chat-close");

    chatToggle.addEventListener("click", () => {
      chatWrapper.style.display = "flex";
    });

    chatClose.addEventListener("click", () => {
      chatWrapper.style.display = "none";
    });
  </script>

</body>
</html>
